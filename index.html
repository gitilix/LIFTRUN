<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trainingsplan">
<meta name="theme-color" content="#0A84FF">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Lauf + Kraft Planer</title>
<style>
:root{
  --bg:#f2f2f7; --bg2:#ffffff; --card:#ffffff; --text:#000000; --text2:#6c6c70; --text3:#8e8e93;
  --sep:rgba(60,60,67,0.12); --fill:rgba(120,120,128,0.12);
  --blue:#0A84FF; --green:#30D158; --amber:#FF9F0A; --coral:#FF6B6B; --grey:#8E8E93; --pink:#FF2D92; --red:#FF3B30;
  --nav:rgba(249,249,249,0.94); --shadow:0 1px 3px rgba(0,0,0,0.06);
  --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#000000; --bg2:#1c1c1e; --card:#1c1c1e; --text:#ffffff; --text2:#98989f; --text3:#8e8e93;
    --sep:rgba(84,84,88,0.4); --fill:rgba(120,120,128,0.24);
    --nav:rgba(22,22,24,0.9); --shadow:none;
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,"SF Pro Text","SF Pro Display",BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;}
body{padding-top:var(--safe-t);}
.app{max-width:640px;margin:0 auto;padding-bottom:calc(72px + var(--safe-b));min-height:100vh;}
.view{display:none;padding:8px 16px 20px;}
.view.active{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
h1.big{font-size:34px;font-weight:800;letter-spacing:-0.5px;margin:14px 4px 2px;}
.sub{color:var(--text2);font-size:15px;margin:0 4px 14px;}
.card{background:var(--card);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.card h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text2);margin:0 0 10px;}
.row{display:flex;align-items:center;gap:12px;}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;color:#fff;}
.chip.sm{font-size:11px;padding:3px 8px;}
.pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;background:var(--fill);color:var(--text2);}

/* Countdown */
.count{display:flex;justify-content:space-around;text-align:center;margin-top:4px;}
.count .n{font-size:30px;font-weight:800;letter-spacing:-1px;}
.count .l{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.3px;margin-top:2px;}
.prog{height:8px;background:var(--fill);border-radius:6px;overflow:hidden;margin-top:14px;}
.prog>i{display:block;height:100%;border-radius:6px;background:var(--blue);transition:width .4s;}

/* Session cards */
.sess{background:var(--card);border-radius:16px;padding:14px 14px 14px 16px;margin-bottom:12px;position:relative;border-left:4px solid var(--grey);box-shadow:var(--shadow);}
.sess.done{opacity:0.55;}
.sess .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.sess .t{font-size:17px;font-weight:700;margin:0;}
.sess .day{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:2px;}
.sess ul{margin:10px 0 0;padding:0;list-style:none;}
.sess li{font-size:14px;color:var(--text);padding:4px 0;border-top:1px solid var(--sep);line-height:1.35;}
.sess li:first-child{border-top:none;}
.sess .note{font-size:12px;color:var(--text2);margin-top:8px;font-style:italic;}
.check{flex:0 0 auto;width:30px;height:30px;border-radius:50%;border:2px solid var(--text3);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#fff;transition:.15s;}
.check.on{background:var(--green);border-color:var(--green);}
.rest{text-align:center;color:var(--text2);font-size:15px;padding:24px 0;}

/* Fitness */
.fit{display:flex;justify-content:space-around;text-align:center;}
.fit .n{font-size:26px;font-weight:800;letter-spacing:-0.5px;}
.fit .l{font-size:11px;color:var(--text2);text-transform:uppercase;margin-top:2px;}
.warn{background:rgba(255,159,10,0.14);border:1px solid var(--amber);color:var(--amber);border-radius:14px;padding:12px 14px;font-size:14px;font-weight:600;margin-bottom:14px;}
.danger{background:rgba(255,59,48,0.14);border-color:var(--red);color:var(--red);}

/* buttons */
button.btn{font-family:inherit;font-size:16px;font-weight:600;border:none;border-radius:14px;padding:13px 16px;width:100%;cursor:pointer;color:#fff;background:var(--blue);transition:.15s;}
button.btn:active{transform:scale(.98);opacity:.85;}
button.btn.sec{background:var(--fill);color:var(--blue);}
button.btn.sm{width:auto;padding:8px 14px;font-size:14px;border-radius:11px;}
.ai{white-space:pre-wrap;font-size:15px;line-height:1.5;margin-top:4px;}
.ts{font-size:12px;color:var(--text3);margin-top:10px;}

/* Plan list */
.wk{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shadow);border-left:4px solid var(--grey);}
.wk.cur{outline:2px solid var(--blue);}
.wk .wn{font-size:22px;font-weight:800;width:32px;text-align:center;}
.wk .wm{flex:1;}
.wk .wm .a{font-size:15px;font-weight:600;}
.wk .wm .b{font-size:12px;color:var(--text2);margin-top:2px;}
.wk .cnt{font-size:12px;color:var(--text2);font-weight:600;}
.mini{height:5px;background:var(--fill);border-radius:4px;overflow:hidden;margin-top:6px;max-width:120px;}
.mini>i{display:block;height:100%;background:var(--green);}
.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch;}
.filters button{flex:0 0 auto;font-family:inherit;font-size:13px;font-weight:600;border:none;border-radius:20px;padding:7px 14px;background:var(--fill);color:var(--text2);cursor:pointer;}
.filters button.on{background:var(--blue);color:#fff;}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(2px);}
.modal.open{display:flex;}
.sheet{background:var(--bg);width:100%;max-width:640px;max-height:88vh;border-radius:22px 22px 0 0;overflow-y:auto;padding:8px 16px calc(30px + var(--safe-b));animation:up .3s ease;-webkit-overflow-scrolling:touch;}
@keyframes up{from{transform:translateY(100%);}to{transform:none;}}
.grab{width:40px;height:5px;background:var(--text3);opacity:.4;border-radius:3px;margin:8px auto 14px;}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.mh h3{font-size:24px;font-weight:800;margin:0;}

/* Stats */
.bars{display:flex;align-items:flex-end;gap:4px;height:140px;margin-top:8px;padding-top:8px;}
.bars .b{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px;height:100%;}
.bars .b i{width:100%;border-radius:4px 4px 2px 2px;background:var(--blue);min-height:3px;transition:height .4s;}
.bars .b span{font-size:9px;color:var(--text3);}
.bars .b.cur i{outline:2px solid var(--text);outline-offset:1px;}
.kv{display:flex;justify-content:space-between;padding:9px 0;border-top:1px solid var(--sep);font-size:15px;}
.kv:first-child{border-top:none;}
.kv .k{color:var(--text2);} .kv .v{font-weight:600;}

/* Setup */
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.field input,.field select{width:100%;font-family:inherit;font-size:16px;padding:12px 14px;border-radius:12px;border:1px solid var(--sep);background:var(--bg2);color:var(--text);}
.field.two{display:flex;gap:10px;} .field.two>div{flex:1;}
.status{font-size:14px;padding:10px 14px;border-radius:12px;margin-top:10px;display:none;}
.status.ok{display:block;background:rgba(48,209,88,0.15);color:var(--green);}
.status.err{display:block;background:rgba(255,59,48,0.15);color:var(--red);}
.status.info{display:block;background:var(--fill);color:var(--text2);}
.hint{font-size:12px;color:var(--text3);margin:-6px 2px 14px;line-height:1.4;}

/* Log / Rückmeldung */
textarea{width:100%;font-family:inherit;font-size:15px;padding:12px;border-radius:12px;border:1px solid var(--sep);background:var(--bg2);color:var(--text);min-height:64px;resize:vertical;}
.logedit{padding:12px 0;border-top:1px solid var(--sep);}
.logedit:first-child{border-top:none;}
.logedit>label{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;margin-bottom:8px;}
.lginp{display:flex;align-items:center;gap:6px;}
.lginp input{width:100%;min-width:0;font-family:inherit;font-size:16px;padding:10px 6px;border-radius:10px;border:1px solid var(--sep);background:var(--bg2);color:var(--text);text-align:center;}
.lginp span{color:var(--text2);font-size:14px;flex:0 0 auto;}
.feel{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.feel button{flex:1;min-width:calc(50% - 3px);font-family:inherit;font-size:13px;font-weight:600;padding:9px 4px;border-radius:10px;border:1px solid var(--sep);background:var(--bg2);color:var(--text2);cursor:pointer;}
.feel button.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.logged{margin-top:10px;background:var(--fill);border-radius:10px;padding:8px 10px;}
.logrow{font-size:13px;padding:2px 0;}
#toast{position:fixed;left:50%;bottom:calc(84px + var(--safe-b));transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,0.9);color:#fff;padding:12px 18px;border-radius:14px;font-size:14px;font-weight:600;max-width:90%;text-align:center;opacity:0;pointer-events:none;transition:.3s;z-index:200;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media (prefers-color-scheme: dark){#toast{background:rgba(60,60,64,0.96);}}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;height:calc(64px + var(--safe-b));padding-bottom:var(--safe-b);
  background:var(--nav);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:0.5px solid var(--sep);display:flex;z-index:50;}
.nav button{flex:1;background:none;border:none;font-family:inherit;color:var(--text3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding-top:8px;}
.nav button.on{color:var(--blue);}
.nav button svg{width:24px;height:24px;}
.nav button span{font-size:10px;font-weight:600;}
</style>
</head>
<body>
<div class="app">
  <div id="v-heute" class="view active"></div>
  <div id="v-plan" class="view"></div>
  <div id="v-stats" class="view"></div>
  <div id="v-setup" class="view"></div>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<nav class="nav">
  <button data-tab="heute" class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>Heute</span></button>
  <button data-tab="plan"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>Plan</span></button>
  <button data-tab="stats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg><span>Stats</span></button>
  <button data-tab="setup"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg><span>Setup</span></button>
</nav>

<script>
"use strict";
/* ===================== KONFIG & STATE ===================== */
const START = new Date(2026,6,13);      // Mo 13.07.2026
const TOTAL_WEEKS = 13;
const DOW = ["So","Mo","Di","Mi","Do","Fr","Sa"];
const PHASE_COLOR = {Base:"blue",Build:"green",Peak:"amber",Taper:"coral",Deload:"grey",Race:"pink"};
const CVAR = {blue:"var(--blue)",green:"var(--green)",amber:"var(--amber)",coral:"var(--coral)",grey:"var(--grey)",pink:"var(--pink)"};

const DEFAULT_STATE = {
  athleteId:"i563859",
  keys:{icu:"",anthropic:"",model:"claude-sonnet-5"},
  goal:{name:"Wien Halbmarathon", date:"2026-10-11", target:"Sub 1:25:00", pace:"4:02/km"},
  oneRM:{squat:120,bench:105,deadlift:140,press:70,row:80,incline:90},
  logs:{},               // sessionId -> {squat:{w,sets,reps,feeling}, ...}
  completed:{},
  icuCache:null,        // {ts,ctl,atl,form,activities:[]}
  manualFitness:null,   // {ctl,atl,form}
  analysis:null         // {ts,text}
};
let S = load();
function load(){
  try{ const r=JSON.parse(localStorage.getItem("lkplan")||"{}");
    return deepMerge(structuredClone(DEFAULT_STATE), r);
  }catch(e){ return structuredClone(DEFAULT_STATE); }
}
function deepMerge(a,b){ for(const k in b){ if(b[k]&&typeof b[k]==="object"&&!Array.isArray(b[k])){ a[k]=deepMerge(a[k]||{},b[k]); } else if(b[k]!==undefined){ a[k]=b[k]; } } return a; }
function save(){ try{ localStorage.setItem("lkplan",JSON.stringify(S)); }catch(e){} }

/* ===================== HELPERS ===================== */
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function fmt(d){ return DOW[d.getDay()]+" "+String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."; }
function iso(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function today(){ const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function round25(x){ return Math.round(x/2.5)*2.5; }
function nkg(x){ return (x%1===0? x : x.toFixed(1)); }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

/* ===================== KRAFT-SCHEMA ===================== */
// Basis-1RM aus Strong-Daten (Epley) -> editierbar. p = %1RM
const MAIN = {
  1:{s:4,r:5,p:75,ph:"Build"}, 2:{s:4,r:5,p:77.5,ph:"Build"}, 3:{s:4,r:5,p:80,ph:"Build"},
  4:{s:5,r:5,p:77.5,ph:"Build"}, 5:{s:4,r:5,p:82.5,ph:"Build"}, 6:{s:5,r:4,p:85,ph:"Build"},
  7:{s:4,r:4,p:87.5,ph:"Build"}, 8:{deload:true,test:true,ph:"Deload"},
  9:{s:5,r:3,p:85,ph:"Intensity"}, 10:{s:4,r:3,p:87.5,ph:"Intensity"}, 11:{s:5,r:2,p:90,ph:"Intensity"},
  12:{deload:true,test:true,ph:"Deload"}, 13:{s:3,r:2,p:80,ph:"Peak",note:"scharf bleiben · RPE 6"}
};
function setStr(m,orm){ return m.s+"×"+m.r+" @ "+nkg(round25(orm*m.p/100))+" kg ("+m.p+"%)"; }
function kraftA(n){
  const m=MAIN[n], o=S.oneRM, L=[];
  if(m.test){
    L.push("Back Squat — <b>1RM-Test</b> (neuen Wert in Setup eintragen)");
    L.push("Bench Press — <b>1RM-Test</b>");
    L.push("Barbell Row — 3×8 @ RPE 6 (locker)");
    L.push("Pull-Up — 3× (Reps −2, kein Maximum)");
    L.push("Curls / Dips locker · RPE ≤ 6");
  } else {
    L.push("Back Squat — "+setStr(m,o.squat));
    L.push("Bench Press — "+setStr(m,o.bench));
    L.push("Barbell Row — "+m.s+"×"+Math.max(m.r,6)+" @ "+nkg(round25(o.row*(m.p-12)/100))+" kg");
    L.push("Pull-Up — 4× max (Zusatzgewicht ab 10 Whd.)");
    L.push("Bicep Curl 3×10 · Triceps Dip 3× max");
  }
  return L;
}
function kraftB(n){
  const m=MAIN[n], o=S.oneRM, L=[];
  if(m.test){
    L.push("Deadlift — <b>1RM-Test</b> (neuen Wert in Setup eintragen)");
    L.push("Military Press — <b>1RM-Test</b>");
    L.push("RDL — 3×8 @ RPE 6");
    L.push("Row-Variante — 3×10 locker");
    L.push("Pull-Up / Dips locker · RPE ≤ 6");
  } else {
    L.push("Deadlift — "+Math.max(3,m.s-1)+"×"+Math.min(3,m.r)+" @ "+nkg(round25(o.deadlift*m.p/100))+" kg ("+m.p+"%) · max 3 Whd");
    L.push("Military Press — "+setStr(m,o.press));
    L.push("Romanian Deadlift — 3×8 @ "+nkg(round25(o.deadlift*0.6))+" kg (RPE 7)");
    L.push("Row-Variante (Pendlay) — "+m.s+"×"+Math.max(m.r,8)+" @ "+nkg(round25(o.row*(m.p-12)/100))+" kg");
    L.push("Pull-Up 3× max · Bicep Curl 3×10");
  }
  return L;
}

/* ===================== RÜCKMELDUNG / STRONG-IMPORT / PROGRESSION ===================== */
const LIFTMETA={squat:{name:"Back Squat"},bench:{name:"Bench Press"},deadlift:{name:"Deadlift"},press:{name:"Military Press"},row:{name:"Barbell Row"}};
const SESSION_LIFTS={mo:["squat","bench","row"],mi:["deadlift","press"]};
const FEEL={leicht:0.025,passt:0.0125,schwer:0,fail:-0.05};
const FEELICON={leicht:"💪",passt:"👍",schwer:"😮‍💨",fail:"❌"};
let logSel={};

function prescribe(k,n){
  const m=MAIN[n], o=S.oneRM[k];
  if(m.test) return {weight:"",sets:"",reps:""};
  if(k==="deadlift") return {weight:round25(o*m.p/100),sets:Math.max(3,m.s-1),reps:Math.min(3,m.r)};
  if(k==="row") return {weight:round25(o*(m.p-12)/100),sets:m.s,reps:Math.max(m.r,6)};
  return {weight:round25(o*m.p/100),sets:m.s,reps:m.r};
}
// Neuer Arbeits-1RM aus geloggtem Top-Satz + Gefühl (RPE-Proxy)
function applyAdjust(k,e){
  const base=S.oneRM[k];
  const w=+e.w, r=Math.max(1,+e.reps||1);
  const e1 = w>0 ? w*(1+r/30) : 0;      // Epley aus Top-Satz
  let nm=base;
  if(e.feeling){
    nm=base*(1+(FEEL[e.feeling]||0));
    if((e.feeling==="leicht"||e.feeling==="passt") && e1>nm) nm=e1;
  } else if(e1>base){ nm=e1; }          // ohne Gefühl: nur nach oben
  return round25(Math.max(20,nm));
}
// Strong-Text (Teilen → Kopieren) parsen
function mapLift(name){
  const s=name.toLowerCase();
  if(s.includes("incline")||s.includes("romanian")) return null; // Accessory, nicht 1RM-relevant
  if(s.includes("squat")) return "squat";
  if(s.includes("deadlift")) return "deadlift";
  if(s.includes("bench")) return "bench";
  if(s.includes("military")||s.includes("overhead")||s.includes("shoulder")||(s.includes("press")&&!s.includes("leg")&&!s.includes("bench"))) return "press";
  if(s.includes("row")) return "row";
  return null;
}
function parseStrong(text){
  const lines=text.split(/\r?\n/); let cur=null; const res={};
  for(const raw of lines){
    const line=raw.trim(); if(!line) continue;
    const setM=/^(?:set|satz|arbeitssatz|w)\s*\d*\s*[:.]/i.test(line);
    const kg=line.match(/([\d.,]+)\s*kg\s*[x×*]\s*(\d+)/i);
    if(kg){
      if(/warm/i.test(line)) continue;
      if(!cur) continue;
      const w=parseFloat(kg[1].replace(",",".")), r=parseInt(kg[2],10);
      if(!res[cur]) res[cur]={sets:0,best:{w:0,r:0,e:0}};
      res[cur].sets++;
      const e=w*(1+r/30);
      if(e>res[cur].best.e) res[cur].best={w,r,e};
      continue;
    }
    if(setM) continue;                    // Satz ohne kg (Körpergewicht) → ignorieren
    const key=mapLift(line);
    cur = key;                            // neue Übung (oder null = uninteressant)
  }
  const out={};
  for(const k in res){ if(res[k]&&res[k].best.w>0) out[k]={w:res[k].best.w,reps:res[k].best.r,sets:res[k].sets}; }
  return out;
}

function saveLog(id,n,dayKey,test){
  const lifts=SESSION_LIFTS[dayKey]||[], entry={}, changes=[];
  lifts.forEach(k=>{
    let w=+val("lg-"+k+"-w"), sets=+val("lg-"+k+"-s"), reps=+val("lg-"+k+"-r");
    if(k==="deadlift"&&reps>3) reps=3;
    if(!w&&!reps) return;
    const feeling=logSel[k]||null;
    entry[k]={w,sets,reps,feeling};
    const before=S.oneRM[k];
    if(test){ if(w>0) S.oneRM[k]=round25(w); }
    else { S.oneRM[k]=applyAdjust(k,{w,reps,feeling}); }
    if(S.oneRM[k]!==before) changes.push(LIFTMETA[k].name+" "+nkg(before)+"→"+nkg(S.oneRM[k]));
  });
  const note=val("lg-note"); if(note) entry.note=note;
  S.logs[id]=entry; S.completed[id]=true;
  save(); rebuildPlan(); closeModal(); renderAll();
  toast(changes.length? "Angepasst: "+changes.join(" · ")+" kg" : "Rückmeldung gespeichert ✓");
}
function logBlock(s){
  const dayKey=s.id.split("-")[1];

  const lg=S.logs[s.id]; let h="";
  if(lg){

      const e=lg[k]; return `<div class="logrow">${LIFTMETA[k].name}: <b>${nkg(e.w)} kg</b> ${e.sets}×${e.reps} ${FEELICON[e.feeling]||""}</div>`;

    h+=`<div class="logged">${rows}${lg.note?`<div class="logrow" style="color:var(--text2)">📝 ${esc(lg.note)}</div>`:""}</div>`;
  }
  h+=`<button class="btn sec sm" style="margin-top:10px" onclick="openLog('${s.id}',${n},'${dayKey}')">${lg?"✏️ Rückmeldung ändern":"📝 Rückmeldung / Strong-Import"}</button>`;

}

};

};

function phaseOf(n){ if(n<=3)return"Base"; if(n<=7)return"Build"; if(n===8)return"Deload"; if(n<=11)return"Peak"; if(n===12)return"Taper"; return"Race"; }

/* ===================== PLAN BAUEN ===================== */
function buildWeek(n){
  const mon = addDays(START,(n-1)*7);
  const phase = phaseOf(n);
  const q = QUALITY[n];
  const qd = q.d + (STRIDE_WEEKS.includes(n) ? " + 4×100 m Strides" : "");
  const easyTxt = EASY[n] || "10 km TB1 (>5:34/km) + 6×100 m Strides @ 4:02/km · 60 s Geh";
  const sess = [
    {id:"w"+n+"-mo", day:1, date:addDays(mon,0), cat:"kraft", title:"Kraft A", lines:kraftA(n),
      note:"Easy-Lauf nach Kraft ok · Quality NIE am selben Tag"},
    {id:"w"+n+"-di", day:2, date:addDays(mon,1), cat:"lauf", title:"Easy Run + Strides", lines:[easyTxt]},
    {id:"w"+n+"-mi", day:3, date:addDays(mon,2), cat:"kraft", title:"Kraft B", lines:kraftB(n),
      note:"≥12–16 h Abstand zur Quality am Do"},
    {id:"w"+n+"-do", day:4, date:addDays(mon,3), cat:"lauf", title:q.t, lines:["Einlaufen 15 min TB1", qd, "Auslaufen 10 min TB1"]},
    {id:"w"+n+"-sa", day:6, date:addDays(mon,5), cat:"long", title:"Long Run", lines:[LONG[n]]}
  ];
  if(n===13){
    sess.push({id:"w13-so", day:0, date:addDays(mon,6), cat:"race", title:"🏁 RACE DAY",
      lines:["Wien Halbmarathon · 21,1 km", "Zielpace 4:02/km · Ziel Sub 1:25:00", "HF 182–185 bpm"],
      note:"Viel Erfolg, Felix! 🎯"});
  }
  return {n, mon, phase, sess, km:WEEKKM[n]};
}
function buildPlan(){ const w=[]; for(let n=1;n<=TOTAL_WEEKS;n++) w.push(buildWeek(n)); return w; }
let PLAN = buildPlan();
function rebuildPlan(){ PLAN = buildPlan(); }

/* ===================== HEUTE-INFO ===================== */
function planPos(){
  const t=today();
  const diff=Math.floor((t-START)/86400000);
  if(diff<0) return {pre:true, daysToStart:-diff};
  const wk=Math.floor(diff/7)+1;
  if(wk>TOTAL_WEEKS) return {done:true};
  return {wk, weekday:t.getDay(), date:t};
}
function raceInfo(){
  const t=today();
  const race=new Date(S.goal.date+"T00:00:00");
  const days=Math.max(0,Math.ceil((race-t)/86400000));
  const totalDays=Math.max(1,Math.round((race-START)/86400000));
  const elapsed=Math.min(totalDays,Math.max(0,Math.round((t-START)/86400000)));
  const pct=Math.min(100,Math.round(elapsed/totalDays*100));
  return {days, weeks:Math.floor(days/7), pct};
}
function fitness(){
  if(S.icuCache) return {src:"Intervals.icu", ...S.icuCache};
  if(S.manualFitness) return {src:"manuell", ...S.manualFitness};
  return null;
}

    <div class="kv"><span class="k">Barbell Row</span><span class="v">${nkg(o.row)} kg</span></div>
  </div>`;

  // Laktattest
  html+=`<div class="card"><h2>Laktattest ÖISM · 19.03.2026</h2>
    <div class="kv"><span class="k">IAS</span><span class="v">14,0 km/h · 4:17/km</span></div>
    <div class="kv"><span class="k">HF an IAS</span><span class="v">182 bpm</span></div>
    <div class="kv"><span class="k">VO₂max</span><span class="v">54,9 ml/min/kg</span></div>
    <div class="kv"><span class="k">VCM</span><span class="v">3:19:04 · ØHF 168 · max 188</span></div>
    <div class="kv"><span class="k">Gewicht</span><span class="v">85 kg</span></div>
  </div>`;
  el.innerHTML=html;
}

  <div class="card"><h2>Ziel / Race</h2>
    <div class="field"><label>Bezeichnung</label><input id="g-name" value="${esc(S.goal.name)}"></div>
    <div class="field two">
      <div><label>Datum</label><input id="g-date" type="date" value="${S.goal.date}"></div>
      <div><label>Zielzeit</label><input id="g-target" value="${esc(S.goal.target)}"></div>
    </div>
    <div class="field"><label>Zielpace</label><input id="g-pace" value="${esc(S.goal.pace)}"></div>
  </div>

  <div class="card"><h2>Intervals.icu</h2>
    <div class="field"><label>Athlete ID</label><input id="k-id" value="${esc(S.athleteId)}" autocapitalize="off"></div>
    <div class="field"><label>API Key</label><input id="k-icu" type="password" value="${esc(S.keys.icu)}" placeholder="API Key" autocapitalize="off"></div>
    <p class="hint">Intervals.icu → Settings → Developer → API Key</p>
    <button class="btn sec" onclick="fetchICU(true)">🔄 Verbinden & Daten laden</button>
    <div class="status" id="icu-status"></div>
  </div>

  <div class="card"><h2>Anthropic Claude</h2>
    <div class="field"><label>API Key</label><input id="k-ant" type="password" value="${esc(S.keys.anthropic)}" placeholder="sk-ant-..." autocapitalize="off"></div>
    <div class="field"><label>Modell</label><select id="k-model">
      ${["claude-sonnet-5","claude-opus-4-8","claude-haiku-4-5-20251001"].map(m=>`<option ${S.keys.model===m?"selected":""}>${m}</option>`).join("")}
    </select></div>
    <p class="hint">Key liegt im Klartext im localStorage (nur dein Gerät). Direkter Browser-Zugriff aktiv.</p>
  </div>

  <div class="card"><h2>Manuelle Fitness (Fallback)</h2>
    <p class="hint" style="margin-top:0">Falls Intervals.icu per CORS blockt: CTL/ATL/Form hier eintragen.</p>
    <div class="field two">
      <div><label>CTL</label><input id="m-ctl" type="number" value="${S.manualFitness?.ctl??""}" placeholder="z.B. 65"></div>
      <div><label>ATL</label><input id="m-atl" type="number" value="${S.manualFitness?.atl??""}" placeholder="z.B. 70"></div>
    </div>

  </div>

  <div class="card"><h2>1RM (kg) — Basis für Kraftprozente</h2>
    <div class="field two"><div><label>Back Squat</label><input id="o-squat" type="number" value="${o.squat}"></div>
      <div><label>Bench Press</label><input id="o-bench" type="number" value="${o.bench}"></div></div>
    <div class="field two"><div><label>Deadlift</label><input id="o-deadlift" type="number" value="${o.deadlift}"></div>
      <div><label>Military Press</label><input id="o-press" type="number" value="${o.press}"></div></div>
    <div class="field"><label>Barbell Row</label><input id="o-row" type="number" value="${o.row}"></div>
    <p class="hint">Startwerte aus deinen Strong-Daten geschätzt (Epley). In Deload-Wochen 8 & 12 testen und aktualisieren.</p>
  </div>

  <button class="btn" onclick="saveSetup()">💾 Alles speichern</button>

function val(id){ const e=document.getElementById(id); return e?e.value.trim():""; }
function saveSetup(){
  S.goal={name:val("g-name"),date:val("g-date"),target:val("g-target"),pace:val("g-pace")};
  S.athleteId=val("k-id"); S.keys.icu=val("k-icu"); S.keys.anthropic=val("k-ant"); S.keys.model=val("k-model");
  S.oneRM={squat:+val("o-squat"),bench:+val("o-bench"),deadlift:+val("o-deadlift"),press:+val("o-press"),row:+val("o-row"),
    incline:S.oneRM.incline};
  save(); rebuildPlan();
  showStatus("setup-status","ok","✓ Gespeichert. Plan aktualisiert.");
  renderAll();
}
function saveManual(){
  const ctl=+val("m-ctl"), atl=+val("m-atl");
  if(!ctl&&!atl){ S.manualFitness=null; }
  else { S.manualFitness={ctl:ctl||null, atl:atl||null, form:(ctl&&atl)?Math.round(ctl-atl):null}; }
  save(); showStatus("setup-status","ok","✓ Fitness gespeichert."); renderAll();
}
function resetProgress(){ if(confirm("Alle Häkchen zurücksetzen?")){ S.completed={}; save(); renderAll(); } }
function showStatus(id,cls,msg){ const e=document.getElementById(id); if(!e)return; e.className="status "+cls; e.textContent=msg; }

/* ===================== INTERVALS.ICU ===================== */
async function fetchICU(showMsg){
  const key=val("k-icu")||S.keys.icu;
  const id=val("k-id")||S.athleteId;
  if(!key||!id){ showStatus("icu-status","err","API Key & Athlete ID nötig."); return; }
  S.keys.icu=key; S.athleteId=id; save();
  if(showMsg) showStatus("icu-status","info","Lade Daten …");
  const newest=iso(today()), oldest=iso(addDays(today(),-28));
  const auth="Basic "+btoa("API_KEY:"+key);
  try{
    const [wRes,aRes]=await Promise.all([
      fetch(`https://intervals.icu/api/v1/athlete/${id}/wellness?oldest=${oldest}&newest=${newest}`,{headers:{Authorization:auth}}),
      fetch(`https://intervals.icu/api/v1/athlete/${id}/activities?oldest=${oldest}&newest=${newest}`,{headers:{Authorization:auth}})
    ]);
    if(!wRes.ok) throw new Error("HTTP "+wRes.status);
    const well=await wRes.json();
    const acts=aRes.ok? await aRes.json():[];
    const withCtl=well.filter(w=>w.ctl!=null).sort((a,b)=>a.id<b.id?-1:1);
    const last=withCtl[withCtl.length-1]||{};
    const ctl=Math.round(last.ctl||0), atl=Math.round(last.atl||0);
    const activities=(acts||[]).slice(0,6).map(a=>({
      name:a.name, date:(a.start_date_local||"").slice(0,10),
      km:a.distance?(a.distance/1000).toFixed(1):null, load:a.icu_training_load||null, type:a.type
    }));
    S.icuCache={ts:new Date().toLocaleString("de-AT"), ctl, atl, form:ctl-atl, activities};
    save();
    if(showMsg) showStatus("icu-status","ok",`✓ Verbunden · CTL ${ctl} · ATL ${atl} · Form ${ctl-atl}`);
    renderAll();
    return true;
  }catch(e){
    if(showMsg) showStatus("icu-status","err","Fehler: "+e.message+" — evtl. CORS. Nutze manuellen Fallback unten.");
    return false;
  }
}

/* ===================== CLAUDE ANALYSE ===================== */
async function analyze(){
  const key=S.keys.anthropic||val("k-ant");
  if(!key){ go("setup"); showStatus("setup-status","err","Anthropic API Key fehlt."); return; }
  const btn=document.getElementById("anBtn"); if(btn){ btn.textContent="🤖 Analysiere …"; btn.disabled=true; }
  // ICU frisch laden falls Key vorhanden
  if(S.keys.icu && !S.icuCache){ await fetchICU(false); }
  const pos=planPos();
  const f=fitness();
  let todaySess="Ruhetag";
  if(pos.wk){ const wk=PLAN[pos.wk-1]; const ts=wk.sess.filter(s=>s.day===pos.weekday);
    if(ts.length) todaySess=ts.map(s=>s.title+": "+s.lines.join("; ")).join(" | "); }
  const actTxt=(f&&f.activities)?f.activities.map(a=>`${a.date} ${a.type} ${a.km||""}km Load:${a.load||"-"}`).join("\n"):"keine Daten";
  const prompt=`Du bist mein Lauf- und Krafttrainer (österreichisches Deutsch, per Du, direkt).
Athlet: Felix, 85 kg. Ziel: ${S.goal.name} am ${S.goal.date}, ${S.goal.target} (Pace ${S.goal.pace}).
Laktattest: IAS 4:17/km, HF 182, VO2max 54,9.
Aktuelle Woche: ${pos.wk||"vor Start"} / 13 (${pos.wk?PLAN[pos.wk-1].phase:""}).
Heutige geplante Einheit: ${todaySess}
Fitness (Intervals.icu): CTL ${f?.ctl??"?"}, ATL ${f?.atl??"?"}, Form/TSB ${f?.form??"?"}.
Letzte Aktivitäten:\n${actTxt}

Gib eine konkrete Empfehlung für HEUTE (max 130 Wörter): Soll ich die geplante Einheit so machen, anpassen oder ruhen? Wenn Form < -20 oder hohe Fatigue: Intensität klar reduzieren und sagen wie. Nenne konkrete Paces/Gewichte falls sinnvoll. Kein Fließtext-Geschwafel, komm auf den Punkt.`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:S.keys.model||"claude-sonnet-5",max_tokens:500,messages:[{role:"user",content:prompt}]})
    });
    if(!res.ok){ const t=await res.text(); throw new Error("HTTP "+res.status+" "+t.slice(0,120)); }
    const data=await res.json();
    const text=(data.content&&data.content[0]&&data.content[0].text)||"Keine Antwort.";
    S.analysis={ts:new Date().toLocaleString("de-AT"), text};
    save(); renderAll();
  }catch(e){
    S.analysis={ts:new Date().toLocaleString("de-AT"), text:"⚠️ Fehler: "+e.message+"\n\nPrüfe API Key/Modell in Setup. Bei CORS: Anthropic erlaubt direkten Browser-Zugriff nur mit gültigem Key."};
    save(); renderAll();
  }
}

/* ===================== NAV ===================== */
function go(tab){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("v-"+tab).classList.add("active");
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  window.scrollTo(0,0);
}
document.querySelectorAll(".nav button").forEach(b=> b.addEventListener("click",()=>go(b.dataset.tab)) );

function renderAll(){ renderHeute(); renderPlan(); renderStats(); renderSetup(); }

/* ===================== INIT ===================== */
renderAll();
// Auto-refresh ICU wenn Key vorhanden & Cache alt (>3h)
if(S.keys.icu && (!S.icuCache || (Date.now()-new Date(S.icuCache.ts).getTime())>10800000)){
  fetchICU(false);
}
